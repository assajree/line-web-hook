<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Summary Data</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/summary.css">
</head>
<body>
    <div id="appHeader"></div>
    <main>
        <h1>Summary Data</h1>
        <p>เลือก group และเดือนจาก log ที่มีอยู่ แล้วใช้ AI จากหน้า Config เพื่อสรุปรายการแจ้งปัญหา</p>
        <section class="panel">
            <div class="grid">
                <label>Group
                    <select id="groupSelect"></select>
                </label>
                <label>Month
                    <select id="monthSelect"></select>
                </label>
                <button id="summaryButton" type="button">Summary</button>
            </div>
            <div id="status" class="status"></div>
            <textarea id="summaryOutput" placeholder="เลือกข้อมูลแล้วกด Summary เพื่อเริ่มสรุปรายการแจ้งปัญหา"></textarea>
        </section>
    </main>
    <script src="/js/layout.js"></script>
    <script src="/js/summary.js"></script>
</body>
</html>
